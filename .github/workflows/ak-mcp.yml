name: ak-mcp

# Build, verify, and deploy the AK MCP documentation server.
#
# This repo is STANDALONE: the kernel headers are vendored under vendor/ak-inc/
# (committed), so no firmware checkout is needed to build or deploy. Refresh the
# snapshot with the `refresh-headers` job (or `npm run fetch-headers` locally).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Firmware release tag to vendor (blank = fetch-headers default)"
        required: false
        default: ""
  # Let the firmware repo trigger a header refresh when the kernel changes:
  # send a repository_dispatch with event_type "firmware-updated".
  repository_dispatch:
    types: [firmware-updated]

jobs:
  verify:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build corpus + drift check
        run: npm run drift
      - name: Test (extractor, corpus, search)
        run: npm test
      - name: Typecheck (core + cli)
        run: npm run typecheck

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Build corpus (bundled into the Worker)
        run: npm run build:corpus
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Refresh vendor/ak-inc/ from the firmware repo, verify, and commit if changed.
  refresh-headers:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Fetch vendored headers
        run: node scripts/fetch-headers.mjs ${{ github.event.inputs.tag }}
      - name: Verify the new snapshot builds and tests pass
        run: |
          npm run drift
          npm test
      - name: Commit if the snapshot changed
        run: |
          if git diff --quiet vendor/ak-inc; then
            echo "vendor/ak-inc unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add vendor/ak-inc
            git commit -m "chore: refresh vendored AK kernel headers"
            git push
          fi
